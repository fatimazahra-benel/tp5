name : ci_pipeline
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
jobs:
  lint:
    runs-on:  ubuntu-latest
    steps:
      -  name:  recuperer le code 
         uses:  actions/checkout@v4
      -  name:  installer python
         uses:  actions/setup-python@v5
         with:
           python-version:  "3.11"
      -  name:  installer les dépendances
         run:  pip install -r requirement.txt
      -  name:  installer flake8
         run:  pip install flake8
      -  name:  lancer le linter
         run:  | 
           flake8 app --count --select=E9,F63,F7,F841 --show-source --statistics
           flake8 app --count --max-complexity=10 --max-line-length=127 --statistics
           flake8 tests --count --max-line-length=127 --statistics
  test:
    runs-on:  ubuntu-latest
    needs:  lint
    steps: 
      -  name: installer les dépendances
         run:  pip install -r requirement.txt
      -  name: executer pytest avec couverture
         run:  python -m pytest tests/ -v --cov=app
  build:
    needs:  test
    steps:
      -  name:  générer le package
         run:  python -m build
      -  name: upload du resultat comme artefact
         uses:  actiona/upload-artifact@v3
    
    


     
