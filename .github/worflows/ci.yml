name : ci_pipeline
on:
  push:
    branches:
      -main
  pull_request:
      -main
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      -  name:  Récupérer le code
      -  uses:  actions/checkout 
      -  name:  installer python
      -  uses:  actions/setup-python
         with:
          python-version:  "3.11"
      -  name:  installer les dépendances
         run:  pip install -r requirement.txt
      -  name:  installer flake8
         run:  pip install flake8
      -  name:  lancer le linter
      -  run:  | 
        flake8 app --count --select=E9,F63,F7,F841 --show-source --statistics
        flake8 app --count --max-complexity=10 --max-line-length=127 --statistics
        flake8 tests --count --max-line-length=127 --statistics
      -  name:  lancer les tests
         run:  pytest -v --cov=app
      

     
